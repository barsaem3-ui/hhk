<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <title>EASTSAT Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Floating Background Blobs -->
    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <img src="logo.png" alt="EASTSAT Logo" class="login-logo">
                <h1>EASTSAT Management</h1>
                <p>Welcome back! Please login to continue.</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label for="login-id">Email Address</label>
                    <input type="email" id="login-id" placeholder="barsaem3@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="login-pw">Password</label>
                    <input type="password" id="login-pw" placeholder="••••••••" required>
                </div>
                <button id="login-btn" class="btn btn-primary btn-block">Login</button>
                <div id="login-error" class="login-error hidden">Invalid credentials. Please try again.</div>
            </div>
            <div class="login-footer">
                © 2024 EASTSAT. All rights reserved.
            </div>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">

        <header class="app-header">
            <!-- Floating Glass Squares -->
            <div class="header-glass"></div>
            <div class="header-glass"></div>
            <div class="header-glass"></div>
            <div class="header-glass"></div>
            <div class="header-glass"></div>
            <div class="header-left">
                <!-- Animation container removed to fix button click issues -->
                <img src="logo.png" alt="EASTSAT Logo" class="header-logo">
            </div>
            <div class="header-right">
                <button id="add-btn" class="btn btn-primary">새 항목 추가</button>
                <button id="print-btn" class="btn btn-secondary">리스트 출력</button>
                <span id="sync-status">● 동기화 중...</span>
            </div>
        </header>

        <main class="app-content">
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th><div class="th-content"><span>No</span></div></th>
                            <th><div class="th-content"><span>날짜</span><button class="btn-filter" data-col="1">▼</button></div></th>
                            <th><div class="th-content"><span>의뢰처</span><button class="btn-filter" data-col="2">▼</button></div></th>
                            <th><div class="th-content"><span>사업명</span><button class="btn-filter" data-col="3">▼</button></div></th>
                            <th><div class="th-content"><span>부품명</span><button class="btn-filter" data-col="4">▼</button></div></th>
                            <th><div class="th-content"><span>도번</span><button class="btn-filter" data-col="5">▼</button></div></th>
                            <th><div class="th-content"><span>수량</span><button class="btn-filter" data-col="6">▼</button></div></th>
                            <th><div class="th-content"><span>내용</span><button class="btn-filter" data-col="7">▼</button></div></th>
                            <th><div class="th-content"><span>처리</span><button class="btn-filter" data-col="8">▼</button></div></th>
                            <th><div class="th-content"><span>처리일자</span><button class="btn-filter" data-col="9">▼</button></div></th>
                            <th><div class="th-content"><span>완료</span><button class="btn-filter" data-col="10">▼</button></div></th>
                            <th><div class="th-content"><span>완료일자</span><button class="btn-filter" data-col="11">▼</button></div></th>
                            <th><div class="th-content"><span>댓글</span></div></th>
                            <th><div class="th-content" style="font-size: 0.5rem;"><span>삭제</span></div></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data rows will be dynamically inserted here -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer class="app-footer">
            <!-- Logo removed per user request -->
        </footer>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-icon">⚙️</div>
            <h2 id="modal-title">설정 확인</h2>
            <p id="modal-message">저장하시겠습니까?</p>
            <div class="modal-actions">
                <button id="modal-btn-no" class="btn btn-outline">아니오</button>
                <button id="modal-btn-yes" class="btn btn-primary">예</button>
            </div>
        </div>
    </div>

    <!-- Text Edit Popup Modal -->
    <div id="edit-popup-modal" class="modal-overlay hidden">
        <div class="modal-content edit-popup-glass">
            <textarea id="edit-popup-input" class="edit-textarea" maxlength="90" placeholder="내용 입력..."></textarea>
        </div>
    </div>

    <!-- Template for Table Row -->
    <template id="row-template">
        <tr class="data-row">
            <td class="col-no cell-no" style="text-align: center; font-size: 0.85rem;"></td>
            <td class="col-date"><input type="text" class="input-field" maxlength="10" placeholder="MMDD"></td>
            <td class="col-client"><input type="text" class="input-field" maxlength="20"></td>
            <td class="col-project"><input type="text" class="input-field" maxlength="20"></td>
            <td class="col-part"><input type="text" class="input-field" maxlength="30"></td>
            <td class="col-drawing"><input type="text" class="input-field" maxlength="16"></td>
            <td class="col-quantity"><input type="text" class="input-field" maxlength="10"></td>
            <td class="col-content"><input type="text" class="input-field" maxlength="90"></td>
            <td class="col-process"><input type="text" class="input-field" maxlength="90"></td>
            <td class="col-process-date"><input type="text" class="input-field" maxlength="4" placeholder="MMDD"></td>
            <td class="col-complete-check" style="text-align: center; vertical-align: middle;">
                <input type="checkbox" class="complete-checkbox" style="transform: scale(1.3); cursor: pointer;">
            </td>
            <td class="col-complete-date"><input type="text" class="input-field" maxlength="4" placeholder="MMDD"></td>
            <td class="col-actions">
                <button class="btn btn-icon btn-comment" title="댓글" style="font-size: 0.85rem; font-weight: bold; color: #333; display: inline-flex; align-items: center; gap: 2px; padding: 2px 6px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0084ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 18 C3.35 18 2 16.65 2 15 V6 C2 4.35 3.35 3 5 3 H19 C20.65 3 22 4.35 22 6 V15 C22 16.65 20.65 18 19 18 H9 L4 22 V18 Z" />
                        <line x1="7" y1="7.5" x2="15" y2="7.5" />
                        <line x1="7" y1="11" x2="18" y2="11" />
                        <line x1="7" y1="14.5" x2="12" y2="14.5" />
                    </svg>
                    <span class="comment-count" style="font-size: 0.65em; font-weight: bold; color: #0084ff; transform: translateY(-2px);">0</span>
                </button>
            </td>
            <td class="col-delete-row" style="text-align: center; vertical-align: middle;">
                <button class="btn-delete-row" title="행 삭제" style="background: none; border: none; font-size: 0.5rem; color: #888; cursor: pointer;">✕</button>
            </td>
        </tr>
        <tr class="comment-row hidden">
            <td colspan="14">
                <div class="comment-section">
                    <div class="comment-list"></div>
                    <div class="comment-input-area">
                        <input type="text" class="comment-input" placeholder="본문글 > 댓글달기">
                        <button class="btn btn-small btn-submit-comment">등록</button>
                    </div>
                </div>
            </td>
        </tr>
    </template>

    <!-- Filter Popup -->
    <div id="filter-popup" class="filter-popup hidden">
        <div class="filter-popup-search">
            <input type="text" id="filter-popup-search-input" placeholder="검색...">
        </div>
        <div class="filter-popup-header">
            <label><input type="checkbox" id="filter-select-all" checked> (모두 선택)</label>
        </div>
        <div class="filter-popup-list" id="filter-popup-list">
            <!-- Checkboxes will be injected here -->
        </div>
        <div class="filter-popup-actions">
            <button id="filter-btn-apply" class="btn btn-primary" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">확인</button>
            <button id="filter-btn-clear" class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;">필터 해제</button>
        </div>
    </div>

    </div> <!-- End of app-container -->

    <script src="script.js"></script>
</body>
</html>
